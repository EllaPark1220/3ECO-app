<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>INDEX 용어 사전 — 고요의 경제나루</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hahmlet:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<style>
  :root {
    color-scheme: light;
    --bg-light: #F8FCFC;
    --water-light: #DCEAEE;
    --water-card: #EBF5F5;
    --accent-soft: #86D0D6;
    --accent-main: #1A8E9C;
    --accent-deep: #0D5F6D;
    --text-main: #0E2B30;
    --text-soft: #4A5A60;
    --text-mute: #7A8A90;
    --line-light: #DCE7E8;
    --line-soft: #E8F0F0;

    --hahmlet: "Hahmlet", serif;
    --pretendard: "Pretendard Variable", -apple-system, sans-serif;
    --mono: "JetBrains Mono", monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: var(--pretendard);
    background: var(--bg-light);
    color: var(--text-main);
    line-height: 1.78;
    font-size: 16px;
  }

  .skip-link {
    position: absolute; top: -40px; left: 0;
    background: var(--accent-deep); color: #FFFFFF;
    padding: 8px 16px; text-decoration: none; font-size: 14px; z-index: 200;
  }
  .skip-link:focus { top: 0; }

  a:focus-visible, button:focus-visible, input:focus-visible {
    outline: 2px solid var(--accent-main);
    outline-offset: 3px; border-radius: 4px;
  }

  /* ============== NAV ============== */
  .nav {
    position: sticky; top: 0; z-index: 100;
    padding: 18px 40px;
    display: flex; justify-content: space-between; align-items: center;
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    background: rgba(248, 252, 252, 0.92);
    border-bottom: 1px solid var(--line-soft);
  }
  .nav-logo {
    font-family: var(--hahmlet); font-weight: 600; font-size: 16px;
    color: var(--text-main); letter-spacing: -0.01em; text-decoration: none;
  }
  .nav-links { display: flex; gap: 26px; align-items: center; }
  .nav-links a {
    font-size: 14px; color: var(--text-soft); text-decoration: none;
    font-weight: 500; transition: color 0.2s ease;
  }
  .nav-links a:hover { color: var(--accent-deep); }
  .nav-links a.active { color: var(--accent-deep); font-weight: 600; }

  /* ============== 본문 ============== */
  .page { max-width: 820px; margin: 0 auto; padding: 50px 40px 80px; }

  /* 페이지 헤더 */
  .page-header { margin-bottom: 36px; }
  .page-eyebrow {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.3em;
    color: var(--accent-deep); font-weight: 600; margin-bottom: 16px;
    text-transform: uppercase;
  }
  .page-title {
    font-family: var(--hahmlet); font-weight: 600;
    font-size: clamp(28px, 4.5vw, 42px); line-height: 1.3;
    color: var(--text-main); letter-spacing: -0.015em; margin-bottom: 12px;
  }
  .page-lead {
    font-family: var(--pretendard); font-size: 15px;
    color: var(--text-soft); line-height: 1.85;
    max-width: 520px;
  }

  /* ============== 검색·인덱스 (sticky) ============== */
  .search-zone {
    position: sticky;
    top: 60px;
    z-index: 50;
    background: rgba(248, 252, 252, 0.94);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 16px 0 18px;
    margin: 0 -8px 28px;
    padding-left: 8px;
    padding-right: 8px;
    border-bottom: 1px solid var(--line-soft);
  }

  .search-input-wrap {
    position: relative;
    margin-bottom: 14px;
  }

  .search-input {
    width: 100%;
    padding: 14px 18px 14px 46px;
    border: 1.5px solid var(--line-light);
    border-radius: 12px;
    background: #FFFFFF;
    font-family: var(--pretendard);
    font-size: 15px;
    color: var(--text-main);
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  .search-input::placeholder { color: var(--text-mute); }

  .search-input:focus {
    outline: none;
    border-color: var(--accent-main);
    box-shadow: 0 0 0 3px rgba(26, 142, 156, 0.15);
  }

  .search-icon {
    position: absolute;
    left: 16px; top: 50%;
    transform: translateY(-50%);
    width: 18px; height: 18px;
    color: var(--text-mute);
    pointer-events: none;
  }

  /* 자모 인덱스 */
  .jamo-index {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .jamo-link {
    min-width: 32px;
    height: 32px;
    padding: 0 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    background: transparent;
    border: 1px solid var(--line-light);
    color: var(--text-main);
    font-family: var(--pretendard);
    font-weight: 600;
    font-size: 13.5px;
    text-decoration: none;
    transition: all 0.2s ease;
  }

  .jamo-link:hover {
    background: var(--water-card);
    border-color: var(--accent-soft);
    color: var(--accent-deep);
  }

  .jamo-link.disabled {
    color: var(--line-light);
    pointer-events: none;
    border-color: var(--line-soft);
  }

  /* ============== 자모 그룹 ============== */
  .jamo-group { margin-bottom: 40px; }

  .jamo-group-label {
    display: inline-block;
    font-family: var(--hahmlet);
    font-weight: 700;
    font-size: 28px;
    color: var(--accent-deep);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--accent-soft);
    min-width: 50px;
    text-align: center;
    scroll-margin-top: 200px;
  }

  /* ============== 용어 카드 ============== */
  .terms-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .term {
    padding: 20px 22px;
    border-radius: 14px;
    transition: background 0.2s ease;
  }

  .term:hover {
    background: var(--water-card);
  }

  .term-word {
    font-family: var(--hahmlet);
    font-weight: 600;
    font-size: 20px;
    color: var(--text-main);
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }

  .term-def {
    font-family: var(--pretendard);
    font-size: 15px;
    color: var(--text-soft);
    line-height: 1.75;
    margin-bottom: 12px;
  }

  .term-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px 8px 12px;
    background: #FFFFFF;
    border: 1px solid var(--line-light);
    border-radius: 100px;
    text-decoration: none;
    font-family: var(--pretendard);
    font-size: 12.5px;
    color: var(--text-soft);
    transition: all 0.2s ease;
  }

  .term-link:hover {
    border-color: var(--accent-main);
    background: var(--water-light);
    color: var(--accent-deep);
    transform: translateX(2px);
  }

  .term-link-arrow {
    width: 12px;
    height: 12px;
    flex-shrink: 0;
  }

  .term-link-meta {
    font-family: var(--mono);
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--accent-deep);
  }

  .term-link-title {
    color: var(--text-soft);
    max-width: 360px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .term-link:hover .term-link-title { color: var(--text-main); }

  /* ============== 결과 없음 ============== */
  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-mute);
    display: none;
  }

  .empty-state.show { display: block; }

  .empty-state-title {
    font-family: var(--hahmlet);
    font-weight: 500;
    font-size: 18px;
    color: var(--text-soft);
    margin-bottom: 6px;
  }

  .empty-state-desc {
    font-family: var(--pretendard);
    font-size: 14px;
  }

  /* ============== 통계 ============== */
  .stats {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 18px;
    background: var(--water-card);
    border: 1px solid var(--line-light);
    border-radius: 100px;
    margin-top: 18px;
  }
  .stats-num {
    font-family: var(--hahmlet); font-weight: 700;
    font-size: 16px; color: var(--accent-deep);
  }
  .stats-text {
    font-family: var(--pretendard); font-size: 13px;
    color: var(--text-soft);
  }

  /* ============== Footer ============== */
  .footer {
    background: var(--water-light);
    text-align: center;
    padding: 50px 40px;
    margin-top: 80px;
  }
  .footer-line {
    font-family: var(--pretendard); font-size: 12.5px;
    color: var(--text-soft); line-height: 1.95;
  }

  /* ============== 접근성 ============== */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }
  }

  /* ============== 반응형 ============== */
  @media (max-width: 720px) {
    .nav { padding: 14px 20px; }
    .nav-links { gap: 14px; }
    .nav-links a { font-size: 13px; }
    .page { padding: 36px 22px 60px; }
    .term { padding: 18px 16px; }
    .term-word { font-size: 18px; }
    .jamo-group-label { font-size: 24px; }
    .term-link-title { max-width: 200px; }
    .jamo-link { min-width: 28px; height: 28px; font-size: 12.5px; }
  }
</style>
</head>
<body>

  <a href="#main" class="skip-link">본문으로 건너뛰기</a>

  <nav class="nav">
    <a href="/" class="nav-logo">고요의 경제나루</a>
    <div class="nav-links">
      <a href="/">HOME</a>
      <a href="/dictionary" class="active">INDEX</a>
      <a href="/stamp-map">STAMP MAP</a>
      <a href="/login">로그인</a>
    </div>
  </nav>

  <main class="page" id="main">

    <header class="page-header">
      <div class="page-eyebrow">INDEX</div>
      <h1 class="page-title">핵심 용어 사전</h1>
      <p class="page-lead">학습 중에 만난 단어를 찾아보세요. 단어를 누르면 처음 등장한 영상으로 바로 이동합니다.</p>
      <div class="stats">
        <span class="stats-num" id="total-terms">0</span>
        <span class="stats-text">개의 용어 · 5권 133편 전체 기준</span>
      </div>
    </header>

    <!-- 검색 + 자모 인덱스 -->
    <div class="search-zone">
      <div class="search-input-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"/>
          <path d="m21 21-4.3-4.3"/>
        </svg>
        <input type="text" id="search" class="search-input" placeholder="용어 또는 정의 안의 단어를 검색해 보세요" aria-label="용어 검색">
      </div>
      <div class="jamo-index" id="jamo-index"></div>
    </div>

    <!-- 용어 리스트 -->
    <div id="terms-container"></div>

    <!-- 결과 없음 -->
    <div class="empty-state" id="empty-state">
      <div class="empty-state-title">찾으시는 용어가 없습니다</div>
      <div class="empty-state-desc">다른 단어로 검색해 보세요.</div>
    </div>

  </main>

  <footer class="footer">
    <div class="footer-line">결제 정보를 받지 않습니다 · 광고 없음</div>
    <div class="footer-line">CC BY-NC-SA 4.0 라이선스로 배포됩니다</div>
    <div class="footer-line">제작 · ELLA PARK</div>
  </footer>

  <script>
    // ============== 데이터 ==============
    // 1권 「돈의 언어」의 핵심 용어들. 정의는 학습목표·제목 기반으로 작성.
    // 형식: { word, def, vol, ep, epTitle }
    const terms = [
      { word: '가격', def: '누군가의 의지가 아니라 사고파는 만남의 결과로 정해지는 값.', vol: 1, ep: 4, epTitle: '가격은 누가 정할까 — 가격의 정체' },
      { word: '가치', def: '가격과 다를 수 있는, 물건이나 행위가 가진 의미.', vol: 1, ep: 4, epTitle: '가격은 누가 정할까 — 가격의 정체' },
      { word: '간접세', def: '소비자가 부담하지만 사업자가 대신 납부하는 세금. 부가가치세가 대표적.', vol: 1, ep: 13, epTitle: '영수증 맨 아래의 작은 숫자 — 부가가치세' },
      { word: '거래', def: '사고파는 행위. 시장이 성립하는 가장 기본 단위.', vol: 1, ep: 6, epTitle: '사고팔 수 있는 곳이라면 어디든 — 시장의 정체' },
      { word: '건강보험', def: '의료비를 함께 부담하는 4대보험 중 하나.', vol: 1, ep: 17, epTitle: '월급에서 미리 빠지는 안전망 — 4대보험' },
      { word: '경기', def: '경제 전반의 활동이 활발한 정도. 호황과 불황으로 순환함.', vol: 1, ep: 24, epTitle: '경제에도 계절이 있다 — 경기와 호황·불황' },
      { word: '경제 규모', def: '한 나라가 1년 동안 만들어낸 가치의 총합. 흔히 GDP로 측정.', vol: 1, ep: 22, epTitle: '한 나라의 1년 성적표 — GDP' },
      { word: '고용보험', def: '실직이나 휴직 시 생활을 돕는 4대보험 중 하나.', vol: 1, ep: 17, epTitle: '월급에서 미리 빠지는 안전망 — 4대보험' },
      { word: '공급', def: '팔려는 힘. 수요와 만나 가격을 정함.', vol: 1, ep: 5, epTitle: '가격을 움직이는 두 힘 — 수요와 공급' },
      { word: '공제', def: '월급에서 미리 빠지는 항목. 세금과 4대보험으로 구성.', vol: 1, ep: 15, epTitle: '받기로 한 돈과 통장에 들어온 돈 — 세전과 세후' },
      { word: '과세표준', def: '세금을 매기는 기준이 되는 금액.', vol: 1, ep: 16, epTitle: '많이 벌수록 더 떼어가는 이유 — 소득세 구조' },
      { word: '국민연금', def: '노후를 대비해 가입하는 4대보험 중 하나.', vol: 1, ep: 17, epTitle: '월급에서 미리 빠지는 안전망 — 4대보험' },
      { word: '금리', def: '돈을 빌리는 값. 시간과 위험에 대한 대가.', vol: 1, ep: 10, epTitle: '빌린 돈에 붙는 값 — 금리와 이자' },
      { word: '기회비용', def: '어떤 선택을 했을 때 포기한 대안 중 가장 좋았던 것의 가치.', vol: 1, ep: 2, epTitle: '고르지 못한 쪽의 가치 — 기회비용' },

      { word: '누진세', def: '소득이 늘수록 단계별로 다른(높은) 세율을 적용하는 세금 구조.', vol: 1, ep: 16, epTitle: '많이 벌수록 더 떼어가는 이유 — 소득세 구조' },

      { word: '단리', def: '원금에만 이자가 붙는 방식. 복리와 반대.', vol: 1, ep: 11, epTitle: '이자에 이자가 붙는다는 것 — 복리' },
      { word: '대출', def: '미래의 돈을 현재로 당겨오는 거래.', vol: 1, ep: 12, epTitle: '보이지 않는 이력서 — 신용과 대출' },
      { word: '돈', def: '종이나 금속 자체의 가치가 아니라 사회적 약속으로 가치를 갖는 매개.', vol: 1, ep: 7, epTitle: '종이 한 장이 가치를 갖는 이유 — 돈이란 무엇인가' },
      { word: '돈의 기능', def: '교환·가치 저장·가치 척도 — 돈이 사회에서 하는 세 가지 일.', vol: 1, ep: 7, epTitle: '종이 한 장이 가치를 갖는 이유 — 돈이란 무엇인가' },
      { word: '디플레이션', def: '물가가 내리면서 경제 전반이 얼어붙는 신호. 인플레보다 다루기 어려움.', vol: 1, ep: 9, epTitle: '안 사는 게 더 무서운 이유 — 디플레이션' },

      { word: '마진', def: '원가 위에 붙는 이윤. 가격을 구성하는 한 축.', vol: 1, ep: 14, epTitle: '가격표 안에 무엇이 들어 있나 — 원가·마진과 할인의 정체' },
      { word: '매몰비용', def: '이미 지출해 회수할 수 없는 비용. 의사결정에서 빼야 함.', vol: 1, ep: 3, epTitle: '이미 쓴 돈은 잊어야 한다 — 매몰비용과 인센티브' },
      { word: '명세서 구조', def: '월급명세서를 이루는 지급·공제·실수령액의 구성.', vol: 1, ep: 19, epTitle: '월급에서 출발해 어디로 흘러가나 — 명세서 한 장 통합 읽기' },
      { word: '물가', def: '물건과 서비스 가격의 전반적인 평균 수준.', vol: 1, ep: 8, epTitle: '돈의 가치가 녹는다는 것 — 인플레이션' },

      { word: '보험', def: '위험을 함께 나누는 금융 도구. 미리 조금씩 모아 큰 위험에 대비.', vol: 1, ep: 21, epTitle: '모으고, 지키고, 나누는 도구들 — 예금·적금·보험·연금' },
      { word: '복리', def: '이자에 다시 이자가 붙는 구조. 시간이 길어질수록 단리와 격차가 큼.', vol: 1, ep: 11, epTitle: '이자에 이자가 붙는다는 것 — 복리' },
      { word: '부가가치세', def: '거의 모든 물건값에 포함된 10%의 간접세. VAT라고도 함.', vol: 1, ep: 13, epTitle: '영수증 맨 아래의 작은 숫자 — 부가가치세' },
      { word: '부채', def: '갚아야 할 것. 자산의 반대편에 있는 개념.', vol: 1, ep: 20, epTitle: '가진 것과 갚을 것 — 자산과 부채' },
      { word: '불황', def: '경기가 침체된 시기. 거래와 생산이 줄어드는 구간.', vol: 1, ep: 24, epTitle: '경제에도 계절이 있다 — 경기와 호황·불황' },

      { word: '위기와 회복', def: '지난 50년간 한국·세계가 겪은 주요 경제 위기의 큰 흐름.', vol: 5, ep: 22, epTitle: '위기가 왔을 때 — 지난 50년의 기록이 가르치는 것' },
      { word: '위기 시기의 결정', def: '지난 50년간 한국·세계가 겪은 주요 경제 위기의 큰 흐름.', vol: 5, ep: 22, epTitle: '위기가 왔을 때 — 지난 50년의 기록이 가르치는 것' },
      { word: '자동화 시스템', def: '매번 의지로 결정하는 것보다 시스템으로 자동화하는 것이 왜 더 강한지 설명.', vol: 5, ep: 23, epTitle: '시스템으로 사는 법 — 의지에 기대지 않는 자동화' },
      { word: '의지력의 한계', def: '매번 의지로 결정하는 것보다 시스템으로 자동화하는 것이 왜 더 강한지 설명.', vol: 5, ep: 23, epTitle: '시스템으로 사는 법 — 의지에 기대지 않는 자동화' },
      { word: '결정 피로 줄이기', def: '매번 의지로 결정하는 것보다 시스템으로 자동화하는 것이 왜 더 강한지 설명.', vol: 5, ep: 23, epTitle: '시스템으로 사는 법 — 의지에 기대지 않는 자동화' },
      { word: '평생 학습', def: '이 시리즈를 마쳐도 경제 공부가 끝난 것이 아닌 이유.', vol: 5, ep: 24, epTitle: '책 읽기는 끝나도 공부는 끝나지 않는다 — 평생 학습자' },
      { word: '지식의 갱신', def: '이 시리즈를 마쳐도 경제 공부가 끝난 것이 아닌 이유.', vol: 5, ep: 24, epTitle: '책 읽기는 끝나도 공부는 끝나지 않는다 — 평생 학습자' },
      { word: '세계의 변화', def: '이 시리즈를 마쳐도 경제 공부가 끝난 것이 아닌 이유.', vol: 5, ep: 24, epTitle: '책 읽기는 끝나도 공부는 끝나지 않는다 — 평생 학습자' }
    ];

    // ============== 자모 추출 ==============
    const JAMO_LIST = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];

    function getInitialJamo(word) {
      const code = word.charCodeAt(0);
      if (code >= 0xAC00 && code <= 0xD7A3) {
        return JAMO_LIST[Math.floor((code - 0xAC00) / 588)];
      }
      return '#'; // 영문/숫자
    }

    // 한글 가나다 정렬
    terms.sort((a, b) => a.word.localeCompare(b.word, 'ko'));

    // 자모별 그룹핑
    const groups = {};
    terms.forEach(t => {
      const j = getInitialJamo(t.word);
      if (!groups[j]) groups[j] = [];
      groups[j].push(t);
    });

    // ============== 자모 인덱스 렌더링 ==============
    const indexEl = document.getElementById('jamo-index');
    const ORDER = [...JAMO_LIST, '#'];

    ORDER.forEach(j => {
      const exists = !!groups[j];
      const link = document.createElement('a');
      link.className = `jamo-link${exists ? '' : ' disabled'}`;
      link.textContent = j;
      if (exists) link.href = `#group-${j}`;
      else link.setAttribute('aria-disabled', 'true');
      indexEl.appendChild(link);
    });

    // ============== 용어 리스트 렌더링 ==============
    const container = document.getElementById('terms-container');

    ORDER.forEach(j => {
      if (!groups[j]) return;
      const group = document.createElement('section');
      group.className = 'jamo-group';
      group.id = `group-${j}`;
      group.setAttribute('aria-labelledby', `label-${j}`);

      const groupHTML = [`<h2 class="jamo-group-label" id="label-${j}">${j}</h2>`, '<div class="terms-list">'];

      groups[j].forEach(t => {
        groupHTML.push(`
          <article class="term" data-keywords="${(t.word + ' ' + t.def).toLowerCase()}">
            <h3 class="term-word">${t.word}</h3>
            <p class="term-def">${t.def}</p>
            <a class="term-link" href="/lesson/${t.vol}-${t.ep}">
              <svg class="term-link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12 H19"/>
                <path d="M12 5 L19 12 L12 19"/>
              </svg>
              <span class="term-link-meta">${t.vol}권 ${t.ep}편</span>
              <span class="term-link-title">${t.epTitle}</span>
            </a>
          </article>
        `);
      });

      groupHTML.push('</div>');
      group.innerHTML = groupHTML.join('');
      container.appendChild(group);
    });

    // ============== 통계 ==============
    document.getElementById('total-terms').textContent = terms.length;

    // ============== 검색 ==============
    const searchInput = document.getElementById('search');
    const emptyState = document.getElementById('empty-state');

    searchInput.addEventListener('input', (e) => {
      const q = e.target.value.trim().toLowerCase();
      const allTerms = document.querySelectorAll('.term');
      let visibleCount = 0;

      allTerms.forEach(termEl => {
        const keywords = termEl.dataset.keywords;
        const match = !q || keywords.includes(q);
        termEl.style.display = match ? '' : 'none';
        if (match) visibleCount++;
      });

      // 자모 그룹 자체 숨김 (그 그룹의 모든 용어가 안 보이면)
      document.querySelectorAll('.jamo-group').forEach(g => {
        const visibleTerms = g.querySelectorAll('.term:not([style*="display: none"])');
        g.style.display = visibleTerms.length > 0 ? '' : 'none';
      });

      // 결과 없음
      emptyState.classList.toggle('show', visibleCount === 0);
    });
  </script>
