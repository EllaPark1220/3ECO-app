<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>스탬프 맵 — 고요의 경제나루</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hahmlet:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<style>
  :root {
    color-scheme: light;
    --bg-light: #F8FCFC;
    --water-light: #DCEAEE;
    --water-card: #EBF5F5;
    --accent-soft: #86D0D6;
    --accent-main: #1A8E9C;
    --accent-deep: #0D5F6D;
    --text-main: #0E2B30;
    --text-soft: #4A5A60;
    --text-mute: #7A8A90;
    --line-light: #DCE7E8;
    --line-soft: #E8F0F0;

    --vol1-light: #F5FAFD;
    --vol1-base: #DCEAF5;
    --vol1-deep: #B8D2E5;

    --vol2-light: #FEF7F9;
    --vol2-base: #F9E0E7;
    --vol2-deep: #ECC0CC;

    --vol3-light: #FEFAEC;
    --vol3-base: #FAEDD0;
    --vol3-deep: #ECDDB0;

    --vol4-light: #F5FAF3;
    --vol4-base: #DEEDD9;
    --vol4-deep: #BFD7BB;

    --vol5-light: #FFFFFF;
    --vol5-base: #F8F8F5;
    --vol5-deep: #E0E0DA;

    --hahmlet: "Hahmlet", serif;
    --pretendard: "Pretendard Variable", -apple-system, sans-serif;
    --mono: "JetBrains Mono", monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: var(--pretendard);
    background: var(--bg-light);
    color: var(--text-main);
    line-height: 1.78;
    font-size: 16px;
    background-image:
      radial-gradient(circle at 10% 5%, rgba(26, 142, 156, 0.04) 0%, transparent 40%),
      radial-gradient(circle at 90% 95%, rgba(241, 233, 219, 0.3) 0%, transparent 50%);
  }

  .skip-link {
    position: absolute; top: -40px; left: 0;
    background: var(--accent-deep); color: #FFFFFF;
    padding: 8px 16px; text-decoration: none; font-size: 14px; z-index: 200;
  }
  .skip-link:focus { top: 0; }

  a:focus-visible, button:focus-visible {
    outline: 2px solid var(--accent-main);
    outline-offset: 3px; border-radius: 4px;
  }

  .nav {
    position: sticky; top: 0; z-index: 100;
    padding: 18px 40px;
    display: flex; justify-content: space-between; align-items: center;
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    background: rgba(248, 252, 252, 0.85);
    border-bottom: 1px solid var(--line-soft);
  }
  .nav-logo {
    font-family: var(--hahmlet); font-weight: 600; font-size: 16px;
    color: var(--text-main); letter-spacing: -0.01em; text-decoration: none;
  }
  .nav-links { display: flex; gap: 26px; align-items: center; }
  .nav-links a {
    font-size: 14px; color: var(--text-soft); text-decoration: none;
    font-weight: 500; transition: color 0.2s ease;
  }
  .nav-links a:hover { color: var(--accent-deep); }
  .nav-links a.active { color: var(--accent-deep); font-weight: 600; }

  .page { max-width: 1100px; margin: 0 auto; padding: 60px 40px 100px; }

  .page-header { text-align: center; margin-bottom: 70px; }
  .page-eyebrow {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.3em;
    color: var(--accent-deep); font-weight: 600; margin-bottom: 16px;
    text-transform: uppercase;
  }
  .page-title {
    font-family: var(--hahmlet); font-weight: 600;
    font-size: clamp(28px, 4.5vw, 44px); line-height: 1.3;
    color: var(--text-main); letter-spacing: -0.015em; margin-bottom: 14px;
  }
  .page-lead {
    font-family: var(--pretendard); font-size: clamp(14px, 1.4vw, 16px);
    color: var(--text-soft); line-height: 1.85;
    max-width: 520px; margin: 0 auto;
  }

  .overall {
    display: inline-flex; align-items: center; gap: 12px;
    padding: 14px 24px; background: var(--water-card);
    border: 1px solid var(--line-light); border-radius: 100px;
    margin-top: 24px;
  }
  .overall-num {
    font-family: var(--hahmlet); font-weight: 700; font-size: 18px;
    color: var(--accent-deep);
  }
  .overall-text {
    font-family: var(--pretendard); font-size: 14px; color: var(--text-soft);
  }

  .legend-wrap { text-align: center; margin-bottom: 56px; }
  .legend {
    display: inline-flex; align-items: center; gap: 22px;
    padding: 16px 24px;
    background: #FFFFFF;
    border: 1px solid var(--line-light);
    border-radius: 14px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--pretendard); font-size: 13px; color: var(--text-soft);
  }
  .legend-dot {
    width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0;
  }
  .legend-dot.done {
    background:
      radial-gradient(circle at 32% 28%, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0) 25%),
      radial-gradient(circle at 55% 55%, rgba(184, 218, 235, 0.4) 30%, rgba(184, 218, 235, 0.12) 70%),
      radial-gradient(circle at 38% 30%, #FFFFFF 0%, #FBF7F0 50%, #ECDFCC 95%);
  }
  .legend-dot.todo {
    background: transparent;
    border: 1.5px dashed rgba(184, 210, 229, 0.65);
  }

  .volume-section { margin-bottom: 64px; }

  .volume-header {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 20px; padding-bottom: 18px; margin-bottom: 28px;
    border-bottom: 1px solid var(--line-light);
  }

  .volume-header-left {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }

  .volume-color-marker {
    width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0;
    align-self: center;
  }
  .volume-color-marker.vol-1 {
    background:
      radial-gradient(circle at 32% 28%, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0) 25%),
      radial-gradient(circle at 55% 55%, rgba(184, 218, 235, 0.4) 30%, rgba(184, 218, 235, 0.12) 70%),
      radial-gradient(circle at 38% 30%, #FFFFFF 0%, #FBF7F0 50%, #ECDFCC 95%);
    box-shadow: 0 2px 4px -1px rgba(160, 145, 130, 0.4);
  }
  .volume-color-marker.vol-2 {
    background:
      radial-gradient(circle at 32% 28%, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0) 25%),
      radial-gradient(circle at 55% 55%, rgba(240, 197, 208, 0.42) 30%, rgba(240, 197, 208, 0.14) 70%),
      radial-gradient(circle at 38% 30%, #FFFFFF 0%, #FBF7F0 50%, #ECDFCC 95%);
    box-shadow: 0 2px 4px -1px rgba(160, 145, 130, 0.4);
  }
  .volume-color-marker.vol-3 {
    background:
      radial-gradient(circle at 32% 28%, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0) 25%),
      radial-gradient(circle at 55% 55%, rgba(245, 224, 181, 0.46) 30%, rgba(245, 224, 181, 0.15) 70%),
      radial-gradient(circle at 38% 30%, #FFFFFF 0%, #FBF7F0 50%, #ECDFCC 95%);
    box-shadow: 0 2px 4px -1px rgba(160, 145, 130, 0.4);
  }
  .volume-color-marker.vol-4 {
    background:
      radial-gradient(circle at 32% 28%, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0) 25%),
      radial-gradient(circle at 55% 55%, rgba(200, 223, 196, 0.42) 30%, rgba(200, 223, 196, 0.14) 70%),
      radial-gradient(circle at 38% 30%, #FFFFFF 0%, #FBF7F0 50%, #ECDFCC 95%);
    box-shadow: 0 2px 4px -1px rgba(160, 145, 130, 0.4);
  }
  .volume-color-marker.vol-5 {
    background:
      radial-gradient(circle at 32% 28%, rgba(255,255,255,0.98) 0%, rgba(255,255,255,0) 28%),
      radial-gradient(circle at 50% 60%, rgba(220, 200, 230, 0.2) 30%, rgba(255, 230, 220, 0.16) 70%),
      radial-gradient(circle at 38% 30%, #FFFFFF 0%, #FCFAF4 50%, #EDE5D8 95%);
    box-shadow: 0 2px 4px -1px rgba(160, 145, 130, 0.4);
  }

  .volume-num-label {
    font-family: var(--hahmlet); font-weight: 700; font-size: 22px;
    color: var(--accent-deep); letter-spacing: -0.01em;
  }
  .volume-title-label {
    font-family: var(--hahmlet); font-weight: 500; font-size: 20px;
    color: var(--text-main); letter-spacing: -0.005em;
  }
  .volume-question {
    font-family: var(--pretendard); font-size: 13.5px;
    color: var(--text-mute); margin-left: 6px; font-style: italic;
  }

  .volume-progress {
    font-family: var(--mono); font-size: 12px; color: var(--text-soft);
    letter-spacing: 0.05em; white-space: nowrap;
  }
  .volume-progress strong {
    color: var(--accent-deep); font-family: var(--pretendard); font-weight: 700;
  }

  .pearls {
    display: flex; flex-wrap: wrap;
    gap: 16px 14px; padding: 0 4px;
  }

  .pearl {
    width: 32px; height: 32px; border-radius: 50%;
    position: relative; display: inline-flex;
    align-items: center; justify-content: center;
    text-decoration: none;
    transition: all 0.3s ease;
    cursor: pointer;
  }

  .pearl-circle {
    width: 100%; height: 100%; border-radius: 50%;
    transition: all 0.3s ease;
  }

  .pearl-done.pearl-vol-1 .pearl-circle {
    background:
      radial-gradient(circle at 32% 28%, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0) 22%),
      radial-gradient(circle at 55% 55%, rgba(184, 218, 235, 0.32) 30%, rgba(184, 218, 235, 0.1) 70%, rgba(255, 235, 235, 0.12) 100%),
      radial-gradient(circle at 38% 30%, #FFFFFF 0%, #FBF7F0 45%, #ECDFCC 85%, #C8B8A4 100%);
    box-shadow: 0 3px 10px -2px rgba(160, 145, 130, 0.4);
  }
  .pearl-done.pearl-vol-2 .pearl-circle {
    background:
      radial-gradient(circle at 32% 28%, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0) 22%),
      radial-gradient(circle at 55% 55%, rgba(240, 197, 208, 0.34) 30%, rgba(240, 197, 208, 0.12) 70%, rgba(245, 230, 220, 0.12) 100%),
      radial-gradient(circle at 38% 30%, #FFFFFF 0%, #FBF7F0 45%, #ECDFCC 85%, #C8B8A4 100%);
    box-shadow: 0 3px 10px -2px rgba(160, 145, 130, 0.4);
  }
  .pearl-done.pearl-vol-3 .pearl-circle {
    background:
      radial-gradient(circle at 32% 28%, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0) 22%),
      radial-gradient(circle at 55% 55%, rgba(245, 224, 181, 0.38) 30%, rgba(245, 224, 181, 0.14) 70%, rgba(250, 240, 220, 0.12) 100%),
      radial-gradient(circle at 38% 30%, #FFFFFF 0%, #FBF7F0 45%, #ECDFCC 85%, #C8B8A4 100%);
    box-shadow: 0 3px 10px -2px rgba(160, 145, 130, 0.4);
  }
  .pearl-done.pearl-vol-4 .pearl-circle {
    background:
      radial-gradient(circle at 32% 28%, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0) 22%),
      radial-gradient(circle at 55% 55%, rgba(200, 223, 196, 0.34) 30%, rgba(200, 223, 196, 0.12) 70%, rgba(235, 245, 230, 0.12) 100%),
      radial-gradient(circle at 38% 30%, #FFFFFF 0%, #FBF7F0 45%, #ECDFCC 85%, #C8B8A4 100%);
    box-shadow: 0 3px 10px -2px rgba(160, 145, 130, 0.4);
  }
  .pearl-done.pearl-vol-5 .pearl-circle {
    background:
      radial-gradient(circle at 32% 28%, rgba(255,255,255,0.98) 0%, rgba(255,255,255,0) 25%),
      radial-gradient(circle at 50% 60%, rgba(220, 200, 230, 0.18) 30%, rgba(255, 230, 220, 0.14) 70%, rgba(220, 235, 240, 0.16) 100%),
      radial-gradient(circle at 38% 30%, #FFFFFF 0%, #FCFAF4 45%, #EDE5D8 85%, #C8BBAA 100%);
    box-shadow: 0 3px 10px -2px rgba(160, 145, 130, 0.4);
  }

  .pearl-todo.pearl-vol-1 .pearl-circle {
    background: transparent;
    border: 1.5px dashed rgba(184, 210, 229, 0.65);
  }
  .pearl-todo.pearl-vol-2 .pearl-circle {
    background: transparent;
    border: 1.5px dashed rgba(236, 192, 204, 0.65);
  }
  .pearl-todo.pearl-vol-3 .pearl-circle {
    background: transparent;
    border: 1.5px dashed rgba(236, 221, 176, 0.7);
  }
  .pearl-todo.pearl-vol-4 .pearl-circle {
    background: transparent;
    border: 1.5px dashed rgba(191, 215, 187, 0.65);
  }
  .pearl-todo.pearl-vol-5 .pearl-circle {
    background: transparent;
    border: 1.5px dashed rgba(200, 200, 195, 0.7);
  }

  .pearl:hover, .pearl:focus-visible {
    transform: translateY(-4px) scale(1.08);
    z-index: 20;
  }

  .pearl-done:hover .pearl-circle {
    filter: brightness(1.06);
    box-shadow: 0 8px 22px -4px rgba(150, 135, 120, 0.5);
  }

  .pearl-todo:hover .pearl-circle { background: transparent; border-style: solid; }

  .pearl-tip {
    position: absolute;
    bottom: calc(100% + 12px);
    left: 50%; transform: translateX(-50%);
    background: #FFFFFF;
    border: 1px solid var(--line-light);
    border-radius: 10px;
    padding: 10px 14px;
    min-width: 180px;
    text-align: left;
    box-shadow: 0 8px 24px -8px rgba(13, 95, 109, 0.25);
    opacity: 0; visibility: hidden;
    transition: opacity 0.2s ease, visibility 0.2s ease;
    pointer-events: none;
    z-index: 30;
  }
  .pearl-tip::after {
    content: "";
    position: absolute; top: 100%; left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: #FFFFFF;
  }
  .pearl:hover .pearl-tip,
  .pearl:focus-visible .pearl-tip {
    opacity: 1; visibility: visible;
  }
  .pearl-tip-meta {
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.15em; color: var(--accent-deep);
    font-weight: 600; margin-bottom: 4px; text-transform: uppercase;
  }
  .pearl-tip-title {
    font-family: var(--hahmlet); font-weight: 500;
    font-size: 13.5px; color: var(--text-main); line-height: 1.4;
  }
  .pearl-tip-status {
    font-family: var(--pretendard); font-size: 11px;
    color: var(--text-mute); margin-top: 4px;
  }
  .pearl-tip-status.done { color: var(--accent-main); }

  .footer {
    background: var(--water-light);
    text-align: center;
    padding: 50px 40px;
    margin-top: 80px;
  }
  .footer-line {
    font-family: var(--pretendard); font-size: 12.5px;
    color: var(--text-soft); line-height: 1.95;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }
  }

  @media (max-width: 720px) {
    .nav { padding: 14px 20px; }
    .nav-links { gap: 14px; }
    .nav-links a { font-size: 13px; }
    .page { padding: 40px 22px 60px; }
    .volume-header { flex-direction: column; align-items: flex-start; gap: 6px; }
    .pearls { gap: 13px 11px; }
    .pearl { width: 28px; height: 28px; }
    .legend { flex-wrap: wrap; gap: 14px; padding: 14px 18px; }
    .pearl-tip { min-width: 160px; }
  }
</style>
</head>
<body>

  <a href="#main" class="skip-link">본문으로 건너뛰기</a>

  <nav class="nav">
    <a href="/" class="nav-logo">고요의 경제나루</a>
    <div class="nav-links">
      <a href="/">HOME</a>
      <a href="/dictionary">INDEX</a>
      <a href="/stamp-map" class="active">STAMP MAP</a>
      <a href="/login">로그인</a>
    </div>
  </nav>

  <main class="page" id="main">

    <header class="page-header">
      <div class="page-eyebrow">STAMP MAP</div>
      <h1 class="page-title">여기, 당신이 걸어온 길</h1>
      <p class="page-lead">학습한 편마다 작은 진주가 켜집니다.<br>점수도, 등수도, 자극도 없이.</p>

      <div class="overall" role="status">
        <span class="overall-num" id="overall-done">4</span>
        <span class="overall-text">/ 133편 학습 완료</span>
      </div>
    </header>

    <div class="legend-wrap">
      <div class="legend" aria-label="진주 상태 범례">
        <div class="legend-item">
          <span class="legend-dot done"></span>
          <span>학습 완료</span>
        </div>
        <div class="legend-item">
          <span class="legend-dot todo"></span>
          <span>아직 보지 않음</span>
        </div>
      </div>
    </div>

    <div id="volumes"></div>

  </main>

  <footer class="footer">
    <div class="footer-line">결제 정보를 받지 않습니다 · 광고 없음</div>
    <div class="footer-line">CC BY-NC-SA 4.0 라이선스로 배포됩니다</div>
    <div class="footer-line">제작 · ELLA PARK</div>
  </footer>

  <script>
    const volumes = [
      {
        num: 1, title: '돈의 언어',
        question: '경제가 뭔지 말할 수 있나?', count: 27,
        episodes: [
          { n: 1, title: '다 가질 수 없다는 것 — 희소성과 선택' },
          { n: 2, title: '고르지 못한 쪽의 가치 — 기회비용' },
          { n: 3, title: '이미 쓴 돈은 잊어야 한다 — 매몰비용과 인센티브' },
          { n: 4, title: '가격은 누가 정할까 — 가격의 정체' },
          { n: 5, title: '가격을 움직이는 두 힘 — 수요와 공급' },
          { n: 6, title: '사고팔 수 있는 곳이라면 어디든 — 시장의 정체' },
          { n: 7, title: '종이 한 장이 가치를 갖는 이유 — 돈이란 무엇인가' },
          { n: 8, title: '돈의 가치가 녹는다는 것 — 인플레이션' },
          { n: 9, title: '안 사는 게 더 무서운 이유 — 디플레이션' },
          { n: 10, title: '빌린 돈에 붙는 값 — 금리와 이자' },
          { n: 11, title: '이자에 이자가 붙는다는 것 — 복리' },
          { n: 12, title: '보이지 않는 이력서 — 신용과 대출' },
          { n: 13, title: '영수증 맨 아래의 작은 숫자 — 부가가치세' },
          { n: 14, title: '가격표 안에 무엇이 들어 있나 — 원가·마진과 할인의 정체' },
          { n: 15, title: '받기로 한 돈과 통장에 들어온 돈 — 세전과 세후' },
          { n: 16, title: '많이 벌수록 더 떼어가는 이유 — 소득세 구조' },
          { n: 17, title: '월급에서 미리 빠지는 안전망 — 4대보험' },
          { n: 18, title: '노동에도 가격이 있다 — 최저임금' },
          { n: 19, title: '월급에서 출발해 어디로 흘러가나 — 명세서 한 장 통합 읽기' },
          { n: 20, title: '가진 것과 갚을 것 — 자산과 부채' },
          { n: 21, title: '모으고, 지키고, 나누는 도구들 — 예금·적금·보험·연금' },
          { n: 22, title: '한 나라의 1년 성적표 — GDP' },
          { n: 23, title: '돈의 외국 가격 — 환율' },
          { n: 24, title: '경제에도 계절이 있다 — 경기와 호황·불황' },
          { n: 25, title: '평균 너머의 한 단위를 보다 — 평균과 한계' },
          { n: 26, title: '돈의 언어 — 1권 정리 ①' },
          { n: 27, title: '돈의 언어 — 1권 정리 ②' }
        ]
      },
      { num: 2, title: '돈의 흐름', question: '세상이 어떻게 돌아가나?', count: 25, episodes: [
          { n: 1, title: 'GDP를 분해해서 다시 본다 — 네 개의 항목' },
